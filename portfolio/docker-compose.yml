services:
  backend:
    build: ./backend
    container_name: portfolio-backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
    environment:
      - CORS_ORIGINS=*
    networks:
      - portfolio

  frontend:
    build: ./frontend
    container_name: portfolio-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost/api/v1
    depends_on:
      - backend
    networks:
      - portfolio

  nginx:
    build: ./nginx
    container_name: portfolio-nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - portfolio

networks:
  portfolio:
    driver: bridge
