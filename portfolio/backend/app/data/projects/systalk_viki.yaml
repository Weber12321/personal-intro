  - id: description
    label: Description
    type: text
    content: |
      ## Systalk.VIKI — Enterprise GenAI Assistant

      昕力資訊旗下企業級生成式 AI 助理，結合 LLM 微調與多代理架構，為金融產業客戶提供
      精準的內部知識問答服務。

      ### Key Features
      - **兩階段 SFT 方案**: 針對 Breeze 7B 及 Llama 3.1 的監督式微調
      - **金融知識指令集**: 大規模非同步建構，解決多代理架構的數據一致性
      - **MLOps 平台**: 基於 DVC 與 MLflow 的企業級模型生命週期管理

      ### Impact
      - 企業內部知識回覆準確率顯著提升
      - 建立可重複使用的 SFT pipeline

