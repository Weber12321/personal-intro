  - id: poc
    label: POC
    type: poc
    poc_source: Systalk.Coach
    content: |
      ## Systalk.Coach — AI-powered Sales Training

      Systalk.Coach 是 Systalk.VIKI 的 **概念驗證專案**，透過 AI 驅動的銷售角色扮演訓練
      驗證 Self-RAG 工作流與多角色 Agent 架構的可行性。

      ### 要解決的問題

      企業銷售訓練依賴資深員工一對一指導，成本高且難以規模化。
      訓練生缺乏即時回饋，練習機會受限於人力與排程。

      ### 架構：三角色 Agent 協作

      - **Trainee（學員）** — 人類銷售訓練生
      - **Trainer（AI 模擬客戶）** — 基於 Self-RAG 工作流，從知識庫即時檢索產品資訊來模擬真實客戶對話
      - **Supervisor（AI 評估者）** — 訓練結束後自動觸發，產出結構化回饋與對話摘要

      **對話流程：**
      選擇知識庫 → 選擇情境 → 啟動計時對話 → Self-RAG 驅動的即時問答 →
      時間到觸發 Supervisor → 產出評分與改善建議

      ![SIMS 訓練中 — AI Trainer 即時回應，支援語音輸入與計時機制](/images/viki/coach-training.png)

      ![訓練結束 — Supervisor Agent 自動產出結構化回饋與對話摘要](/images/viki/coach-feedback.png)

      ### POC 驗證結果

      - Self-RAG 即時檢索品質確認了向量搜尋 + Rerank 方案的可行性，後續擴展為 VIKI 的完整 RAG Pipeline
      - 多 Agent 協作模式被延伸為 VIKI 的 Hallucination Check 機制
      - 自動化數據管理 pipeline（Django REST + ChromaDB）為後續 LLM 微調奠定數據基礎
