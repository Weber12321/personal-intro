    content: |
      ## Systalk.VIKI — Enterprise GenAI Assistant

      Systalk.VIKI 是昕力資訊的 **企業級 AI 助理產品**，主要客戶為金融業。
      核心訴求是讓企業員工可以用自然語言查詢內部知識庫，並獲得 **有引用來源、可驗證** 的回覆。

      ### Problem

      金融業導入 GenAI 助理的門檻比其他產業更高：
      - **準確度要求極高** — 錯誤的金融資訊可能導致合規風險，通用 LLM 的「幻覺」問題無法接受
      - **知識分散** — 產品說明、法規、FAQ 散落在不同系統中，員工找不到或找到過時的答案
      - **無法黑盒** — 金融客戶需要知道每一個回答的依據來自哪份文件

      ### Solution

      VIKI 提供一套 **端到端的企業 AI 助理方案**：

      1. **多階段品質把關** — 從向量搜尋 → 重排序 → 相關性驗證 → 幻覺偵測，每一層都在過濾不可靠的內容，
         確保最終回覆有據可查
      2. **自動化文件處理** — 上傳 PDF / Word / URL 即可自動切分、向量化並建立索引，無需人工介入

      ![VIKI Chat 介面 — 員工用自然語言提問，系統回覆附帶引用來源](/images/viki/chat-assistant.png)

      3. **模型微調** — 針對金融領域知識進行兩階段 SFT，讓模型真正理解產業術語與業務邏輯
      4. **檢索品質測試** — 內建檢索測試工具，讓維運團隊可以持續驗證和調優搜尋品質

      ![檢索測試介面 — 驗證 RAG 搜尋品質，確保回覆準確度](/images/viki/retrieval-test.png)

      ### What I Built

      我負責 VIKI 的 RAG Pipeline、LLM Server 與文件處理系統：

      - **多階段 RAG Pipeline** — 設計從 Embedding → 向量搜尋 → Rerank → 相關性驗證 → 幻覺偵測的完整檢索流程
      - **LLM Server** — 建構容器化的多模型推論服務，提供統一 API，支援按需切換不同模型
      - **文件 Ingestion** — 實作 PDF → HTML → Chunk → Embedding 的自動化處理 pipeline
      - **兩階段 SFT** — 設計金融領域的監督式微調流程，並建立 MLOps pipeline 管理模型版本

      ### Impact

      - 幻覺偵測機制大幅降低不實回覆率
      - 文件上傳到可搜尋只需分鐘級等待
      - 金融領域知識回覆準確率顯著提升

