  - id: description
    label: Description
    type: text
    content: |
      ## AppsIQ — Coagentic Application Platform

      AppsIQ 是趨勢科技的 **AI 協作應用平台**，讓內部團隊可以快速建立 AI 驅動的業務應用，
      並在同一工作空間中與 AI Agent 即時協作。

      ### Problem

      企業導入 AI 時常見的瓶頸不在模型本身，而在 **如何讓 AI 真正融入日常工作流程**：
      - 業務單位提出需求後，往往需要數週等待 IT 開發專屬工具
      - 現有 ChatBot 只能一問一答，無法深度參與文件編輯、資料查詢等實際工作
      - 多人同時使用時，AI 的修改結果無法即時同步給其他協作者

      ### Solution

      AppsIQ 提供一個 **「應用即服務」** 的平台，讓使用者可以：

      1. **零程式碼建立應用** — 透過 YAML 定義或讓 AI 自動生成，數小時內上線新的業務工具
         （知識庫管理、客戶追蹤、Support Queue 等）
      2. **AI 與人類即時共編** — AI Agent 的每一次修改都透過 CRDT 即時同步到所有協作者畫面，
         就像 Google Docs 多人協作一樣自然
      3. **整合外部系統** — 透過 MCP 協議與 OpenAPI 整合，AI Agent 可以直接操作 D365 CRM、
         知識庫搜尋等外部服務

      ![AppsIQ Knowledge Article Drafter — AI 輔助撰寫知識庫文章，右側面板即時提供建議與重複檢查](/images/appsiq/kb-article-drafter.png)

      ### What I Built

      我在 AppsIQ 負責兩個核心模組的開發：

      - **Knowledge Article Drafter** — 開發 MCP Tools 與 Agent Workflow，讓 AI Agent 能自動檢索
        既有知識庫、比對重複文章、輔助工程師撰寫與審閱技術支援文件，大幅縮短知識文章的產出週期
      - **記憶體管理模組（Mem0 POC）** — 導入 Mem0 進行概念驗證，為 Agent 建立跨 Session 的
        長期記憶能力，讓 AI 能記住用戶偏好與歷史互動脈絡，提升個人化回覆品質

      ![Tool Catalog — 統一管理 Internal / MCP / OpenAPI 三類工具，支援權限分級](/images/appsiq/tool-catalog.png)

      ![App Permission 設定 — 細粒度的存取控制，支援 Editors、Actions、Prompts 分別授權](/images/appsiq/app-permissions.png)

      ### Impact

      - 新應用上線時間從 **數週 → 數小時**
      - 跨區域團隊（US / EU / JP / TW）即時協作
      - 平台上已建立 **Knowledge Article Drafter**、**Feedback Hub**、**Sales Pipeline Tracker** 等多個正式應用
      - 整合 16 個工具模組，涵蓋完整的支援與業務場景

