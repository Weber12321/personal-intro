  - id: description
    label: Description
    type: text
    content: |
      ## AppsIQ Overview

      AppsIQ 是趨勢科技內部的 Agentic AI 與超自動化平台，透過 LangGraph 構建跨區域智能服務，
      整合 FastMCP 工具鏈實現高效率的任務自動化。

      ### Key Features
      - **Agentic Workflows**: 基於 LangGraph 的多代理工作流編排
      - **FastMCP Toolchain**: 利用 FastAPI 優化系統延遲，MCP 架構提升回覆準確率
      - **D365 CRM Integration**: 自動化重複性工作流，減少人工干預

      ### Technical Highlights
      - Cross-regional service orchestration
      - Real-time task routing and execution
      - Scalable agent architecture

