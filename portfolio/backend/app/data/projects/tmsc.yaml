  - id: description
    label: Description
    type: text
    content: |
      ## TMSC — Trend Micro Support Center

      TMSC 是趨勢科技的 **客戶支援中台**，服務全球數千家企業客戶的 Vision One 資安產品線。
      平台的核心目標是讓支援工程師 **更快找到問題根因、更少依賴人工判斷**，
      同時讓客戶也能透過自助診斷解決常見問題。

      ### Problem

      企業級資安產品的技術支援有獨特的複雜度：
      - 客戶回報的問題通常附帶 **數十萬行 Log**，資深工程師需要數小時才能定位根因
      - 不同產品線（Apex One、Deep Security、V1ES 等）各有獨立的診斷邏輯，**新人上手門檻高**
      - US / EU / JP 三大區域各自運作，但客戶期望 **一致的支援品質**
      - 許多常見問題的排查步驟是固定的，卻仍需人工逐步執行

      ### Solution

      TMSC 整合多個微服務，提供一站式的智能支援體驗：

      1. **自動化 Log 掃描** — 客戶上傳 Support Package 後，YARA 規則引擎自動比對已知問題模式，
         產出結構化報告，80%+ 的常見問題可以自動辨識
      2. **一站式 Company Dashboard** — 工程師在單一畫面即可看到客戶的授權狀態、產品部署、
         近期 Case 與 XDR 告警，不用在多個系統間切換

      ![Company Dashboard — 客戶授權、產品部署、XDR 告警一站式檢視](/images/tmsc/company-dashboard.png)

      3. **SCP 自動化產線** — 支援 7+ 產品線的客製化 Support Package，從建立到部署全程自動追蹤，
         支援工程師不再需要手動打包

      ![Endpoint SCP 管理 — 跨區域的 Support Package 請求追蹤與狀態管理](/images/tmsc/endpoint-scp.png)

      4. **自助診斷與 Chatbot** — 客戶可以自行執行常見問題的診斷流程，減少 Tier-1 工單量

      ### What I Built

      我以 **後端 Owner** 身份接手 ITP（Intelligent Troubleshooting Platform）Django 後端，
      負責 API 開發、安全加固、測試基建與日常維運：

      - **API 開發與除錯** — 維護 23 個 Django view 模組的 API 端點，涵蓋 SCP 管理、
        Vision One XDR 整合、YARA 掃描、xSCP 監控等核心業務；修復 SCP Recovery 狀態機邏輯錯誤等關鍵 Bug
      - **安全加固** — 系統性審計接手程式碼，消除遠端程式碼執行風險
      - **測試基建從零建立** — 導入自動化測試 pytest + Django TestCase 框架，建立 unit / security / integration
        分層測試標記，搭配 PR CI workflow 實現提交即驗證；為安全重構的每個模組補齊對應測試
      - **基礎設施管理** — 維護 Helm Charts 與 Kubernetes（AKS）部署配置，
        整合 Azure Key Vault 進行密鑰管理，確保 US / EU / JP 三區域一致部署

      ### Impact

      - 通過安全審計
      - 測試覆蓋率從 **零 → 持續擴展**，PR 合併前自動驗證
      - **US / EU / JP** 三大區域統一部署，診斷品質一致
      - Log 自動掃描覆蓋 **80%+ 常見問題**，工程師從「逐行看 Log」變成「驗證報告建議」

