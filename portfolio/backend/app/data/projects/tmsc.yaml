  - id: description
    label: Description
    type: text
    content: |
      ## TMSC — Trend Micro Smart Companion

      內部智能助理系統，整合 RAG 與 Context Engineering 技術，提供企業內部知識檢索與問答服務。

      ### Key Features
      - **RAG Pipeline**: 高精度知識檢索與生成
      - **Context Engineering**: 動態上下文管理，優化回覆品質
      - **Multi-source Integration**: 整合內部文件、Wiki、Slack 等多來源知識

