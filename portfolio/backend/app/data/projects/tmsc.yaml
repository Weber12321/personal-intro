  - id: poc
    label: POC
    type: poc
    poc_source: TMSC MCP Server
    content: |
      ## TMSC MCP Server — AI-powered Support Automation

      將 TMSC 既有的支援服務能力封裝為 **6 個標準化 MCP Tools**，
      讓 AI Agent（如 AppsIQ）可以程式化地執行 Vision One 客戶帳戶的診斷與維運操作。

      ### 架構

      ```
      AI Agent (AppsIQ)
            │ MCP Protocol (StreamableHTTP)
            ▼
      ┌──────────────────┐
      │  TMSC MCP Server │  FastMCP 3.x
      └────────┬─────────┘
               │ HTTP / WebSocket
          ┌────┼──────────┐
          ▼    ▼          ▼
        SASE  SDS       ITP
      ```

      - 同時對接 3 個異質後端（SASE WebSocket/HTTP、Self-Diagnosis HTTP、ITP Django）
      - 雙模式 WebSocket 協議（Protocol-header 壓縮 + SendParams 交握）
      - 所有 Tool 回傳 Pydantic 結構化回應（steps / summary / recommended_actions）

      ### 技術棧

      FastMCP 3.x · FastAPI · httpx · websockets · Pydantic · PyJWT · Python 3.12 · Docker
