tabs:
  - id: description
    label: Description
    type: text
    content: |
      ## Systalk.Coach — Automated Data Management

      自動化數據管理系統，整合 Django REST Framework、MongoDB 與 OpenSearch，
      為 AI 訓練提供高品質的數據 pipeline。

      ### Key Features
      - **自動化數據管理**: Django REST 驅動的數據 CRUD 與版本控管
      - **全文搜尋引擎**: OpenSearch 提供高效率的知識檢索
      - **資料品質控制**: 自動化資料清洗、標註與驗證流程

