      ## System Design Interview Proposal

      ### 題目：智能移動 AI 代理人（Intelligent Mobility AI Agent）

      設計一個 **MaaS（Mobility as a Service）Multi-Agent 平台**，讓使用者透過自然語言對話
      完成「租車 → 多模式交通規劃 → 餐飲住宿預訂 → 即時車況回報」的端到端旅程。

      ---

      ### 發想

      格上租車正從傳統租車公司轉型為一站式移動服務平台，擁有 Go Smart 共享車、LINE GO（480 萬用戶）、
      機場接送、樂齡服務等多元業務線。目前最核心的 AI 專案是「智能移動 AI 代理人」——
      整合用車數據、交通資訊與使用者行為，主動提供個人化的智慧移動建議。

      **核心問題**：移動服務涵蓋租車、叫車、交通、訂位、長照等多個獨立領域，
      每個領域有不同的 API、推理模式與錯誤處理邏輯。
      如果用單一 Agent 硬塞所有能力，會導致 system prompt 膨脹、tool namespace 污染、無法獨立迭代。

      **設計方向**：採用 **三層協議架構**，讓每個領域由專責 Agent 處理，
      透過 Orchestrator 編排協作，並預留對外夥伴互通的能力：

      | 協議層 | 職責 | 說明 |
      |--------|------|------|
      | **A2A**（Agent-to-Agent） | 跨系統 Agent 互通 | LINE GO Agent、餐飲平台 Agent 等外部夥伴透過 Agent Card 發現與委派任務 |
      | **LangGraph** | 系統內部 Multi-Agent 編排 | Orchestrator 拆解意圖、派發子任務給 Specialist Agents、合併結果 |
      | **MCP**（Model Context Protocol） | Agent → 外部 API 工具呼叫 | 將租車系統、交通查詢、訂位等 API 封裝為標準化 MCP Tools |

      ---

      ### 系統設計限制（Constraints）

      | 維度 | 限制 |
      |------|------|
      | **用戶規模** | 480 萬 LINE GO 註冊用戶，峰值 QPS 預估 500+ |
      | **延遲要求** | 對話首 Token < 2 秒（Streaming），完整回覆 < 10 秒 |
      | **準確度** | 車輛可用性、價格查詢零容錯；交通建議允許最佳近似 |
      | **多語言** | 繁體中文為主，支援英文 / 日文（外籍旅客線上租車場景） |
      | **合規** | 個人資料保護法（PDPA）、駕照驗證 AI 審核需 < 3 分鐘 |
      | **可用性** | 24/7 服務，SLA 99.9% |
      | **成本** | Token 消耗需可監控與設上限，避免 LLM API 成本失控 |
      | **可擴展性** | 新業務線（如樂齡、電動車充電）可以新增 Specialist Agent 而不影響既有流程 |

      ---

      ### Multi-Agent 架構設計

      #### Orchestrator Agent（編排者）

      - 理解用戶意圖，將複雜請求拆解為子任務圖（DAG）
      - 根據子任務類型路由到對應的 Specialist Agent
      - 管理對話記憶（短期 Redis + 長期 LangGraph Checkpoint）
      - 合併各 Specialist 的回應，產出連貫的最終回覆
      - 處理 human-in-the-loop 確認（如預訂前的價格確認）

      #### Specialist Agents（領域專家）

      | Agent | Skills | 工具（MCP） | 說明 |
      |-------|--------|-------------|------|
      | **Rental Agent** | search, reserve, pricing, cancel | 租車系統 API, Go Smart API | 共享車 + 傳統租車的搜尋、預訂、報價、取消 |
      | **Transit Agent** | route_plan, eta, realtime_alert | Google Maps API, 公共運輸 API | 多模式交通規劃（捷運/公車/高鐵），即時到站與延誤通知 |
      | **Booking Agent** | search, book, cancel, recommend | 餐飲訂位 API, 住宿 API | 餐廳與住宿的搜尋、預訂、推薦 |
      | **Elder Care Agent** | dispatch, medical_transport, accessibility | 長照派遣 API, 無障礙資源 API | 樂齡接送、醫療交通、無障礙需求處理 |
      | **Fleet Agent** | vehicle_status, diagnostics, breakdown | 車聯網 API, 道路救援 API | 即時車況監控、故障診斷、道路救援派遣 |

      每個 Specialist Agent 有獨立的 system prompt、tool scope 與 LLM 配置，可以獨立迭代而不影響其他 Agent。

      #### A2A Gateway（對外互通）

      - 發布 **Agent Card**，宣告平台能力（租車、交通、訂位等）
      - 接收外部 Agent 的 Task 委派（如 LINE GO Agent 請求格上查詢共享車可用性）
      - 將外部請求轉為內部 LangGraph 子圖執行
      - 支援 Streaming 回傳中間狀態，讓外部 Agent 可以即時呈現進度

      ---

      ### 工具選擇（Tech Choices & Rationale）

      | 組件 | 選型 | 理由 |
      |------|------|------|
      | **Multi-Agent 編排** | LangGraph（StateGraph + Subgraph） | 每個 Specialist 是一個 Subgraph，Orchestrator 透過 conditional edge 路由；原生 checkpoint 支援長對話斷點續跑 |
      | **Agent 間通訊** | A2A Protocol | Google 開源標準，Agent Card 描述能力、Task 為工作單元、支援 streaming push；預留對外夥伴互通能力 |
      | **LLM** | Multi-model routing | Orchestrator 用 Flash（快速意圖辨識）；Specialist 按複雜度選 Flash / Sonnet / 開源；批次任務用開源模型降成本 |
      | **工具層** | MCP + FastMCP | 標準化 Tool Schema，各 Specialist 只能存取授權的 MCP Tools（權限隔離）；已有 TMSC MCP Server 實戰經驗 |
      | **RAG** | pgvector + BGE M3 + Rerank | 共用知識庫（車輛規格、條款、FAQ），各 Agent 透過 namespace 隔離查詢範圍；BGE M3 原生多語言 |
      | **Session & Memory** | LangGraph Checkpoint + Redis | Checkpoint 持久化完整 multi-agent 圖狀態；Redis 快取用戶偏好與活躍 Session |
      | **Evaluation** | RAGAS + DeepEval + LangSmith | 按 Agent 粒度追蹤品質指標；CI 內跑 regression test；LangSmith trace 每個 node 的 Token 與延遲 |
      | **Streaming** | LangGraph Streaming + FastAPI SSE | Orchestrator 串流各 Specialist 的中間結果（「正在查詢車輛…」「已找到 3 條路線…」） |

      ---

      ### Contribute Value（帶來的價值）

      1. **Multi-Agent 編排實戰**
         - 在趨勢科技 AppsIQ 用 LangGraph 建構 multi-agent 協作平台（AI 與人類即時共編）
         - 熟悉 Orchestrator + Worker 模式、subgraph 拆分、conditional routing

      2. **MCP 工具整合**
         - 在 AppsIQ 設計過 Tool Catalog（Internal + MCP + OpenAPI 三類工具，16 個模組）
         - 在 TMSC MCP Server 實作過 6 個 MCP Tools，整合 3 個異質後端（WebSocket + HTTP + JWT）
         - 可快速設計 Agent Skill → MCP Tool 的映射，並實作權限隔離

      3. **RAG Pipeline 設計**
         - 在 Systalk.VIKI 建構多階段 RAG（Vector Search → Rerank → Relevance Validation → Hallucination Check）
         - 可將幻覺偵測應用在車輛價格與可用性查詢，確保零誤報

      4. **LLM 成本優化**
         - AppsIQ 支援 4 家 LLM Provider（Anthropic / OpenAI / Azure / Ollama）動態切換
         - multi-agent 架構天然適合 per-agent model routing，各 Specialist 用最合適的模型

      5. **A2A 生態拓展**
         - Agent Card + Task 機制讓平台能力可被外部 Agent 發現與使用
         - 格上的移動服務可以成為 MaaS 生態的 Agent 提供者，而不只是 API 提供者

